<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <defs>
    <linearGradient id="dfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00AEEF;stop-opacity:0.8"><animate attributeName="stop-color" values="#00AEEF;#3B82F6;#00AEEF" dur="4s" repeatCount="indefinite"/></stop>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0.8"><animate attributeName="stop-color" values="#A855F7;#8B5CF6;#A855F7" dur="4s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <filter id="dfGlow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="dfShadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="900" height="450" rx="16" fill="#0A0A0F"/>
  <g opacity="0.03">
    <line x1="0" y1="90" x2="900" y2="90" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="270" x2="900" y2="270" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="900" y2="360" stroke="#fff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="450" stroke="#fff" stroke-width="0.5"/>
  </g>

  <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="11" fill="#666" letter-spacing="3">CORTEXOS DATA FLOW & SYSTEM ARCHITECTURE</text>

  <!-- External Sources -->
  <rect x="30" y="60" width="120" height="340" rx="12" fill="#1A1A2E" stroke="#555" stroke-width="0.5" filter="url(#dfShadow)"/>
  <text x="90" y="85" text-anchor="middle" font-family="monospace" font-size="10" fill="#AAA" font-weight="700">EXTERNAL DATA</text>
  <rect x="40" y="110" width="100" height="40" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="90" y="134" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF">Search (Tavily)</text>
  <rect x="40" y="170" width="100" height="40" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="90" y="194" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF">People (Apollo)</text>
  <rect x="40" y="230" width="100" height="40" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="90" y="254" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF">Signals</text>
  <rect x="40" y="290" width="100" height="40" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="90" y="314" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFF">CRM (HubSpot)</text>

  <!-- Arrow from External to Rust -->
  <line x1="150" y1="230" x2="210" y2="230" stroke="#FFF" stroke-width="1" opacity="0.5" stroke-dasharray="4 2"><animate attributeName="stroke-dashoffset" values="0;12" dur="1s" repeatCount="indefinite"/></line>
  <polygon points="210,225 220,230 210,235" fill="#FFF" opacity="0.5"/>

  <!-- Rust Backend -->
  <rect x="220" y="60" width="280" height="340" rx="12" fill="#1A1A2E" stroke="url(#dfGrad)" stroke-width="1.5" filter="url(#dfShadow)"/>
  <text x="360" y="85" text-anchor="middle" font-family="monospace" font-size="11" fill="url(#dfGrad)" font-weight="700" filter="url(#dfGlow)">RUST CORE (TAURI)</text>
  <text x="360" y="100" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">High-Performance Multi-threaded Backend</text>

  <rect x="240" y="120" width="240" height="70" rx="8" fill="#FF5500" fill-opacity="0.1" stroke="#FF5500" stroke-width="0.8"/>
  <text x="360" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF5500" font-weight="700">VERIFICATION ENGINE</text>
  <text x="360" y="155" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">3-Tier Verification (Exact, Normalized, LCS)</text>
  <text x="360" y="170" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Corroboration &amp; Deduplication (O(N²))</text>

  <rect x="240" y="200" width="240" height="70" rx="8" fill="#00D084" fill-opacity="0.1" stroke="#00D084" stroke-width="0.8"/>
  <text x="360" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#00D084" font-weight="700">AGENT ORCHESTRATION</text>
  <text x="360" y="235" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Job Scheduling &amp; LLM Stream Management</text>
  <text x="360" y="250" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Research, Scoring, Outreach, Persona Maps</text>

  <rect x="240" y="280" width="240" height="50" rx="8" fill="#A855F7" fill-opacity="0.1" stroke="#A855F7" stroke-width="0.8"/>
  <text x="360" y="300" text-anchor="middle" font-family="monospace" font-size="10" fill="#A855F7" font-weight="700">LOCAL SQLITE STORE</text>
  <text x="360" y="315" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Companies, Contacts, Intent Signals, Auth</text>

  <rect x="240" y="340" width="240" height="40" rx="6" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="360" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#3B82F6">IPC Event Emitter (Tauri Bridge)</text>

  <!-- Arrow from Rust to React (IPC) -->
  <line x1="500" y1="230" x2="570" y2="230" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 2"><animate attributeName="stroke-dashoffset" values="0;12" dur="0.8s" repeatCount="indefinite"/></line>
  <polygon points="570,225 580,230 570,235" fill="#3B82F6"/>
  <text x="540" y="215" text-anchor="middle" font-family="monospace" font-size="8" fill="#3B82F6">IPC Commands &amp; Streams</text>

  <!-- React Frontend -->
  <rect x="580" y="60" width="290" height="340" rx="12" fill="#1A1A2E" stroke="#00AEEF" stroke-width="1.5" filter="url(#dfShadow)"/>
  <text x="725" y="85" text-anchor="middle" font-family="monospace" font-size="11" fill="#00AEEF" font-weight="700" filter="url(#dfGlow)">REACT FRONTEND</text>
  <text x="725" y="100" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">Vite + Tailwind CSS + Framer Motion</text>

  <rect x="600" y="120" width="250" height="50" rx="8" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="725" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#F59E0B" font-weight="700">STATE (ZUSTAND &amp; TANSTACK)</text>
  <text x="725" y="155" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Global App State, Data Fetching, Optimistic UI</text>

  <rect x="600" y="180" width="250" height="90" rx="8" fill="#EC4899" fill-opacity="0.1" stroke="#EC4899" stroke-width="0.8"/>
  <text x="725" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#EC4899" font-weight="700">INTERACTIVE UI COMPONENTS</text>
  <text x="725" y="215" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">XYFlow Canvas (Flow Builder)</text>
  <text x="725" y="230" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Recharts (ICP Funnel, Revenue Maps)</text>
  <text x="725" y="245" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">D3/Force-Graph (Memory &amp; Buying Committee)</text>

  <rect x="600" y="280" width="250" height="100" rx="8" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="0.8"/>
  <text x="725" y="300" text-anchor="middle" font-family="monospace" font-size="10" fill="#10B981" font-weight="700">THE TRUST LAYER</text>
  <text x="725" y="315" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Real-Time Evidence Parsing (Regex)</text>
  <text x="725" y="330" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Trust Score SVG Rings</text>
  <text x="725" y="345" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Corroboration Badges (Confirmed by N sources)</text>
  <text x="725" y="360" text-anchor="middle" font-family="monospace" font-size="7" fill="#CCC">Live Stream Terminal (Thought Processing)</text>

  <!-- Animated data particles -->
  <circle r="2.5" fill="#FFF" opacity="0.8">
    <animate attributeName="cx" values="150;240;500;600" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="230;230;230;230" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#FFF" opacity="0.8">
    <animate attributeName="cx" values="150;240;500;600" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="230;230;230;230" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
  </circle>

</svg>
