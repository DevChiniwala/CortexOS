<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="vgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5500;stop-opacity:1">
        <animate attributeName="stop-color" values="#FF5500;#FF8C00;#FF5500" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1">
        <animate attributeName="stop-color" values="#FF8C00;#FF5500;#FF8C00" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#00D084"/><stop offset="100%" style="stop-color:#10B981"/></linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#00AEEF"/><stop offset="100%" style="stop-color:#3B82F6"/></linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#FFB020"/><stop offset="100%" style="stop-color:#F59E0B"/></linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#F43F5E"/><stop offset="100%" style="stop-color:#EF4444"/></linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#A855F7"/><stop offset="100%" style="stop-color:#8B5CF6"/></linearGradient>
    <filter id="vgGlow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="vgShadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" rx="16" fill="#0A0A0F"/>
  <g opacity="0.03">
    <line x1="0" y1="80" x2="900" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="900" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="400" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="11" fill="#666" letter-spacing="3">3-TIER VERIFICATION GAUNTLET</text>

  <!-- Step 1: Web Sources -->
  <rect x="30" y="55" width="130" height="80" rx="10" fill="#1A1A2E" stroke="#FF5500" stroke-width="0.8" filter="url(#vgShadow)"/>
  <text x="95" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF5500" font-weight="700">🌐 WEB SOURCES</text>
  <text x="95" y="98" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">LinkedIn · News</text>
  <text x="95" y="112" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">Crunchbase · Docs</text>
  <circle cx="45" cy="125" r="2" fill="#FF5500" opacity="0.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>

  <!-- Arrow 1 -->
  <line x1="160" y1="95" x2="195" y2="95" stroke="#FF5500" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="stroke-dashoffset" values="0;14" dur="0.8s" repeatCount="indefinite"/></line>
  <polygon points="195,90 205,95 195,100" fill="#FF5500"/>

  <!-- Step 2: Tavily Search -->
  <rect x="205" y="55" width="130" height="80" rx="10" fill="#1A1A2E" stroke="#00AEEF" stroke-width="0.8" filter="url(#vgShadow)"/>
  <text x="270" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#00AEEF" font-weight="700">🔍 TAVILY SEARCH</text>
  <text x="270" y="98" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">Raw HTML + Content</text>
  <text x="270" y="112" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">Source URLs Captured</text>
  <circle cx="220" cy="125" r="2" fill="#00AEEF" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite"/></circle>

  <!-- Arrow 2 -->
  <line x1="335" y1="95" x2="370" y2="95" stroke="#00AEEF" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="stroke-dashoffset" values="0;14" dur="0.8s" repeatCount="indefinite"/></line>
  <polygon points="370,90 380,95 370,100" fill="#00AEEF"/>

  <!-- Step 3: Extractor LLM -->
  <rect x="380" y="55" width="140" height="80" rx="10" fill="#1A1A2E" stroke="#A855F7" stroke-width="0.8" filter="url(#vgShadow)"/>
  <text x="450" y="78" text-anchor="middle" font-family="monospace" font-size="10" fill="#A855F7" font-weight="700">🧠 EXTRACTOR LLM</text>
  <text x="450" y="98" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">Gemini 2.5 Flash</text>
  <text x="450" y="112" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">Claims + Quotes + URLs</text>

  <!-- Arrow 3 -->
  <line x1="520" y1="95" x2="555" y2="95" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="stroke-dashoffset" values="0;14" dur="0.8s" repeatCount="indefinite"/></line>
  <polygon points="555,90 565,95 555,100" fill="#A855F7"/>

  <!-- Step 4: Rust Verifier (THE BIG ONE) -->
  <rect x="565" y="45" width="310" height="100" rx="12" fill="#1A1A2E" stroke="url(#vgGrad)" stroke-width="1.5" filter="url(#vgShadow)"/>
  <text x="720" y="68" text-anchor="middle" font-family="monospace" font-size="11" fill="url(#vgGrad)" font-weight="700" filter="url(#vgGlow)">⚙ RUST VERIFICATION ENGINE</text>
  <text x="720" y="85" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Deterministic · No LLM · Pure Math</text>

  <!-- Tier indicators inside the box -->
  <rect x="585" y="95" width="88" height="38" rx="6" fill="#00D084" fill-opacity="0.1" stroke="#00D084" stroke-width="0.5"/>
  <text x="629" y="111" text-anchor="middle" font-family="monospace" font-size="8" fill="#00D084">TIER 1</text>
  <text x="629" y="125" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">Exact Match</text>

  <rect x="683" y="95" width="88" height="38" rx="6" fill="#00AEEF" fill-opacity="0.1" stroke="#00AEEF" stroke-width="0.5"/>
  <text x="727" y="111" text-anchor="middle" font-family="monospace" font-size="8" fill="#00AEEF">TIER 2</text>
  <text x="727" y="125" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">Normalized</text>

  <rect x="781" y="95" width="88" height="38" rx="6" fill="#FFB020" fill-opacity="0.1" stroke="#FFB020" stroke-width="0.5"/>
  <text x="825" y="111" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFB020">TIER 3</text>
  <text x="825" y="125" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">Fuzzy LCS</text>

  <!-- ==================== ROW 2: OUTPUT ==================== -->

  <!-- Arrow down from Rust Verifier -->
  <line x1="720" y1="145" x2="720" y2="185" stroke="url(#vgGrad)" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="stroke-dashoffset" values="0;14" dur="1s" repeatCount="indefinite"/></line>

  <!-- Corroboration Engine -->
  <rect x="565" y="185" width="310" height="65" rx="10" fill="#1A1A2E" stroke="#A855F7" stroke-width="0.8" filter="url(#vgShadow)"/>
  <text x="720" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#A855F7" font-weight="700">🔗 CORROBORATION ENGINE</text>
  <text x="720" y="225" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">LCS de-dupe across sources → "Confirmed by N sources"</text>
  <text x="720" y="240" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">O(N²) pairwise comparison · LCS ratio > 0.85</text>

  <!-- Arrow down from Corroboration -->
  <line x1="720" y1="250" x2="720" y2="285" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="stroke-dashoffset" values="0;14" dur="1s" repeatCount="indefinite"/></line>

  <!-- Grounded Synthesizer -->
  <rect x="565" y="285" width="310" height="55" rx="10" fill="#1A1A2E" stroke="#00D084" stroke-width="0.8" filter="url(#vgShadow)"/>
  <text x="720" y="308" text-anchor="middle" font-family="monospace" font-size="10" fill="#00D084" font-weight="700">📝 GROUNDED SYNTHESIZER</text>
  <text x="720" y="325" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">ONLY verified claims → LLM with forced citations [1][2]</text>

  <!-- ==================== LEFT SIDE: OUTPUTS ==================== -->

  <!-- Trust Score output -->
  <rect x="30" y="185" width="250" height="65" rx="10" fill="#1A1A2E" stroke="#00D084" stroke-width="0.8" filter="url(#vgShadow)"/>
  <text x="155" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#00D084" font-weight="700">✅ TRUST SCORE: 87%</text>
  <text x="155" y="225" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">23 of 26 claims mathematically verified</text>
  <text x="155" y="240" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Deterministic · Reproducible · Auditable</text>

  <!-- Arrow from corroboration to trust score -->
  <line x1="565" y1="217" x2="280" y2="217" stroke="#00D084" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"><animate attributeName="stroke-dashoffset" values="14;0" dur="1.2s" repeatCount="indefinite"/></line>

  <!-- Evidence Cards output -->
  <rect x="30" y="265" width="250" height="80" rx="10" fill="#1A1A2E" stroke="#FFB020" stroke-width="0.8" filter="url(#vgShadow)"/>
  <text x="155" y="288" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFB020" font-weight="700">📋 EVIDENCE CARDS</text>
  <g font-family="monospace" font-size="7">
    <rect x="45" y="298" width="60" height="18" rx="4" fill="#00D084" fill-opacity="0.15" stroke="#00D084" stroke-width="0.4"/>
    <text x="75" y="310" text-anchor="middle" fill="#00D084">🟢 Verified</text>
    <rect x="115" y="298" width="68" height="18" rx="4" fill="#00AEEF" fill-opacity="0.15" stroke="#00AEEF" stroke-width="0.4"/>
    <text x="149" y="310" text-anchor="middle" fill="#00AEEF">🔵 Near Match</text>
    <rect x="193" y="298" width="72" height="18" rx="4" fill="#FFB020" fill-opacity="0.15" stroke="#FFB020" stroke-width="0.4"/>
    <text x="229" y="310" text-anchor="middle" fill="#FFB020">🟡 Likely Match</text>
  </g>
  <text x="155" y="335" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Click any claim → see source URL + confidence %</text>

  <!-- Rejected claims -->
  <rect x="300" y="185" width="245" height="55" rx="10" fill="#1A1A2E" stroke="#F43F5E" stroke-width="0.8" filter="url(#vgShadow)" opacity="0.7"/>
  <text x="422" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#F43F5E" font-weight="700">❌ REJECTED CLAIMS</text>
  <text x="422" y="225" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">Hallucinations silently dropped</text>

  <!-- Arrow from verifier to rejected -->
  <line x1="565" y1="130" x2="545" y2="130" stroke="#F43F5E" stroke-width="1" opacity="0.4"/>
  <line x1="545" y1="130" x2="545" y2="210" stroke="#F43F5E" stroke-width="1" opacity="0.4"/>

  <!-- Bottom tagline -->
  <text x="450" y="380" text-anchor="middle" font-family="monospace" font-size="9" fill="#444" letter-spacing="2">ZERO HALLUCINATIONS · EVERY FACT CITED · MATHEMATICALLY VERIFIED</text>

  <!-- Animated data particles -->
  <circle r="2" fill="#FF5500" opacity="0.7">
    <animate attributeName="cx" values="95;270;450;720;720;720" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;95;95;95;217;310" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0.8;0.6;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#00AEEF" opacity="0.5">
    <animate attributeName="cx" values="95;270;450;720;720;720" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;95;95;95;217;310" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0.6;0.4;0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
